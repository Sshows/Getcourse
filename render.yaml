services:
  - type: web
    name: securecourse-backend
    runtime: node
    rootDir: backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run prisma:deploy && npm run prisma:seed && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_HOURS
        value: 12
      - key: PUBLIC_WEB_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SESSION_IDLE_MINUTES
        value: 15
      - key: PLAYBACK_TOKEN_TTL_SECONDS
        value: 900
      - key: DEFAULT_VIDEO_PROVIDER
        value: MUX
      - key: ALLOW_INSECURE_DEV_VIDEO_FALLBACK
        value: false
      - key: MUX_TOKEN_ID
        sync: false
      - key: MUX_TOKEN_SECRET
        sync: false
      - key: MUX_SIGNING_KEY_ID
        sync: false
      - key: MUX_SIGNING_PRIVATE_KEY_B64
        sync: false
      - key: MUX_WEBHOOK_SECRET
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_STREAM_API_TOKEN
        sync: false
      - key: CLOUDFLARE_STREAM_CUSTOMER_SUBDOMAIN
        sync: false
      - key: CLOUDFLARE_STREAM_SIGNING_KEY_ID
        sync: false
      - key: CLOUDFLARE_STREAM_PRIVATE_KEY
        sync: false
      - key: CLOUDFLARE_STREAM_WEBHOOK_SECRET
        sync: false
